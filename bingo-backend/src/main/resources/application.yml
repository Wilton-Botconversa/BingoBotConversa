spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/bingo
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:bingo-secret-key-change-in-production-must-be-256-bits-long!!}
  expiration: 86400000

botconversa:
  base-url: https://backend.botconversa.com.br/api/v1/webhook
  api-key: ${BOTCONVERSA_API_KEY:}

app:
  cors:
    allowed-origins: http://localhost:4200,http://localhost:3000
